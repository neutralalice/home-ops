---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-xpumd
spec:
  chartRef:
    kind: OCIRepository
    name: intel-xpumd
  interval: 1h
  values:
    gpuAccess: dra
    config:
      service:
        pipelines:
          metrics:
            exporters:
              - intelxpuinfo
              - prometheus
    prometheus:
      monitor: true
      release: kube-prometheus-stack
    grafana:
      dashboards: true
      namespace: kube-system
